name: Release GraphicsUpscalerToggle

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-2022

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Download Dalamud
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
        Expand-Archive -Force latest.zip "$env:AppData\XIVLauncherCN\addon\Hooks\dev"

    - name: Build
      run: dotnet build --configuration Release

    - name: Package
      run: |
        $src = ".\GraphicsUpscalerToggle\bin\x64\Release\GraphicsUpscalerToggle"
        $zip = "latest.zip"
        New-Item -ItemType Directory -Force -Path GraphicsUpscalerToggle
        Copy-Item -Path "$src\*" -Destination GraphicsUpscalerToggle\ -Recurse
        Compress-Archive -Path GraphicsUpscalerToggle -DestinationPath $zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: latest.zip
        generate_release_notes: true
